@if (totalPages > 1) {
<div class="pagination">

  <button class="btn is-secondary is-small" (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1">
    Prev
  </button>

  @for (p of pages(); track p) {
  <button class="btn is-small" [ngClass]="p === currentPage ? 'is-primary' : 'is-secondary'" (click)="changePage(p)">
    {{ p }}
  </button>
  }

  <button class="btn is-primary is-small" (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages">
    Next
  </button>

</div>
}
