<div class="modal-backdrop">
  <div class="modal-card">

    <h2>Logout</h2>
    <p>Are you sure you want to log out?</p>

    <div class="modal-actions">
      <button class="btn btn-primary" (click)="onConfirm()">
        Yes, Logout
      </button>

      <button class="btn btn-secondary" (click)="onCancel()">
        Cancel
      </button>
    </div>

  </div>
</div>
