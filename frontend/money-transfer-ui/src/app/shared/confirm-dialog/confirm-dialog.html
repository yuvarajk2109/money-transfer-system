<div class="modal-backdrop">
  <div class="modal-card">

    <h2 [class]="type === 'primary' ? '' : type">{{ title }}</h2>
    <p>{{ message }}</p>

    <div class="modal-actions">
      <button class="btn" [ngClass]="'is-' + type" (click)="onConfirm()">
        {{ confirmText }}
      </button>

      <button class="btn is-secondary" (click)="onCancel()">
        {{ cancelText }}
      </button>
    </div>

  </div>
</div>
